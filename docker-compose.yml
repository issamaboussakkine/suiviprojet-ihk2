version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: suiviprojet-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: suiviprojet_ihk
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    networks:
      - suiviprojet-network

  backend:
    build: .
    container_name: suiviprojet-backend
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/suiviprojet_ihk
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - suiviprojet-network

  frontend:
    build: ./frontend
    container_name: suiviprojet-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8081/api
    networks:
      - suiviprojet-network

volumes:
  mysql-data:

networks:
  suiviprojet-network:
    driver: bridge